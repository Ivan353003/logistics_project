{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h1>{{ title }}</h1>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger mt-1">
                        {{ field.errors.0 }}
                    </div>
                {% endif %}
            </div>
        {% endfor %}

        <button type="submit" class="btn btn-success">Upload</button>
        <a href="{% url 'booking_detail' container.booking.pk %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
